<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="900" fill="#0B1020"/>
  <text x="80" y="90" fill="#FFFFFF" font-size="44" font-family="Arial, Helvetica, sans-serif" font-weight="700">site-navigator architecture</text>
  <text x="80" y="132" fill="#98A2B3" font-size="24" font-family="Arial, Helvetica, sans-serif">OpenClaw strategy layer for direct links, difficult sites, and stable-first browsing</text>

  <rect x="90" y="190" rx="20" ry="20" width="270" height="100" fill="#111827" stroke="#374151" stroke-width="2"/>
  <text x="225" y="245" text-anchor="middle" fill="#F9FAFB" font-size="28" font-family="Arial" font-weight="700">User link / target</text>

  <rect x="470" y="190" rx="20" ry="20" width="320" height="120" fill="#0F172A" stroke="#3B82F6" stroke-width="3"/>
  <text x="630" y="240" text-anchor="middle" fill="#DBEAFE" font-size="28" font-family="Arial" font-weight="700">Route selection</text>
  <text x="630" y="275" text-anchor="middle" fill="#93C5FD" font-size="20" font-family="Arial">direct URL / platform-aware / browser fallback</text>

  <rect x="910" y="180" rx="20" ry="20" width="380" height="140" fill="#111827" stroke="#8B5CF6" stroke-width="3"/>
  <text x="1100" y="235" text-anchor="middle" fill="#F5F3FF" font-size="28" font-family="Arial" font-weight="700">Current page judgment</text>
  <text x="1100" y="272" text-anchor="middle" fill="#C4B5FD" font-size="20" font-family="Arial">discovery surface vs real target page</text>

  <rect x="860" y="420" rx="20" ry="20" width="280" height="110" fill="#052E16" stroke="#22C55E" stroke-width="3"/>
  <text x="1000" y="475" text-anchor="middle" fill="#DCFCE7" font-size="28" font-family="Arial" font-weight="700">Real target page</text>

  <rect x="1180" y="420" rx="20" ry="20" width="300" height="110" fill="#3F1D0D" stroke="#F59E0B" stroke-width="3"/>
  <text x="1330" y="465" text-anchor="middle" fill="#FEF3C7" font-size="26" font-family="Arial" font-weight="700">Not target yet</text>
  <text x="1330" y="495" text-anchor="middle" fill="#FCD34D" font-size="18" font-family="Arial">continue navigation / switch method</text>

  <rect x="760" y="620" rx="20" ry="20" width="350" height="110" fill="#111827" stroke="#14B8A6" stroke-width="3"/>
  <text x="935" y="670" text-anchor="middle" fill="#CCFBF1" font-size="28" font-family="Arial" font-weight="700">Source / evidence check</text>
  <text x="935" y="700" text-anchor="middle" fill="#99F6E4" font-size="18" font-family="Arial">first-party page, rendered state, stronger source chain</text>

  <rect x="250" y="620" rx="20" ry="20" width="360" height="120" fill="#172554" stroke="#60A5FA" stroke-width="3"/>
  <text x="430" y="670" text-anchor="middle" fill="#DBEAFE" font-size="28" font-family="Arial" font-weight="700">Stable-first answer</text>
  <text x="430" y="705" text-anchor="middle" fill="#93C5FD" font-size="20" font-family="Arial">answer only after target-page judgment is stable</text>

  <rect x="1180" y="620" rx="20" ry="20" width="280" height="120" fill="#1F2937" stroke="#9CA3AF" stroke-width="2"/>
  <text x="1320" y="670" text-anchor="middle" fill="#F3F4F6" font-size="28" font-family="Arial" font-weight="700">Enhancement</text>
  <text x="1320" y="705" text-anchor="middle" fill="#D1D5DB" font-size="18" font-family="Arial">screenshots / extra links / follow-up</text>

  <path d="M360 240H470" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <path d="M790 250H910" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <path d="M1100 320V390" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <path d="M1040 530V620" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <path d="M860 675H610" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <path d="M1110 675H1180" stroke="#6B7280" stroke-width="4" stroke-linecap="round"/>
  <path d="M1240 530C1240 575 1160 590 1100 620" stroke="#6B7280" stroke-width="4" stroke-linecap="round" fill="none"/>

  <circle cx="470" cy="240" r="6" fill="#6B7280"/>
  <circle cx="910" cy="250" r="6" fill="#6B7280"/>
  <circle cx="1100" cy="390" r="6" fill="#6B7280"/>
  <circle cx="1040" cy="620" r="6" fill="#6B7280"/>
  <circle cx="610" cy="675" r="6" fill="#6B7280"/>

  <text x="80" y="840" fill="#6B7280" font-size="18" font-family="Arial">site-navigator focuses on routing, target-page judgment, evidence strength, and recovery — not just browser automation.</text>
</svg>
